apiVersion: apps/v1
kind: Deployment
metadata:
  name: myisoapp
spec:
  replicas: 4
  selector:
    matchLabels:
      app: myisoapp
  template:
    metadata:
      labels:
        app: myisoapp
    spec:
      containers:
      - name: myisoapp
        image: devopsacrlab001.azurecr.io/sampleapp:v1
        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: myisoapp-service
spec:
  type: LoadBalancer
  selector:
    app: myisoapp
  ports:
  - port: 80
    targetPort: 80